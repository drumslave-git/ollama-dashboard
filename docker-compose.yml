services:
  dashboard:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: "3000"
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      GPU_VRAM_TOTAL_GB: ${GPU_VRAM_TOTAL_GB:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
